name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend linting ──────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install ruff black isort

      - name: ruff check
        run: ruff check backend/

      - name: black --check
        run: black --check backend/

      - name: isort --check-only
        run: isort --check-only backend/

  # ── Frontend linting ─────────────────────────────────────────────────────
  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript type-check
        run: npm run type-check
        working-directory: frontend

  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: library_test
          POSTGRES_USER: library
          POSTGRES_PASSWORD: library
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-key-not-for-production
      POSTGRES_DB: library_test
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run pytest
        run: pytest --cov=apps --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -v
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  # ── Frontend tests ────────────────────────────────────────────────────────
  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest
        run: npm test
        working-directory: frontend

  # ── Docker build verification ─────────────────────────────────────────────
  build-docker:
    name: Build — Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: internet-library/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: internet-library/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
